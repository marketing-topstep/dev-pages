<div class="sticky top-8">

  <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500 mb-4 dark:text-neutral-500">
    Documents
  </h2>

  <ul class="space-y-3 text-sm">
    {% for post in site.posts %}
      <li>
        <a 
          href="{{ post.url | relative_url }}"
          class="block text-slate-600 hover:text-slate-900 transition dark:text-neutral-400 dark:hover:text-neutral-100
          {% if page.url == post.url %}underline text-slate-900 dark:text-neutral-100{% endif %}">
          {{ post.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
  <a
        id="add-page"
        href="https://github.com/cameronokeefe-topstep/dev-pages/tree/main/_posts"
        class="inline-flex items-center rounded-md border border-slate-300 px-1.5 py-1.5 mt-4 text-xs font-semibold text-slate-700 hover:bg-slate-100 transition dark:border-neutral-700 dark:text-neutral-200 dark:hover:bg-neutral-800"
        target="_blank"
      >
        <span>{% include icon.html name="plus" %}</span>
  </a>

</div>
